name: nyama_client
description: "NYAMA — Marketplace de livraison de cuisine camerounaise"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.0

  # Navigation
  go_router: ^14.0.0

  # WebSocket temps réel
  socket_io_client: ^3.0.0

  # Stockage sécurisé tokens
  flutter_secure_storage: ^9.0.0

  # Cache images
  cached_network_image: ^3.3.0

  # GPS
  geolocator: ^12.0.0

  # Carte suivi livreur
  google_maps_flutter: ^2.6.0

  # Skeleton loaders
  shimmer: ^3.0.0

  # Formatage FCFA et dates
  intl: ^0.20.2

  # Saisie OTP
  pin_code_fields: ^8.0.0

  # Notation étoiles
  flutter_rating_bar: ^4.0.0

  # Appel téléphonique direct
  url_launcher: ^6.2.0

  # Partage natif (parrainage)
  share_plus: ^10.0.0

  # SVG logo
  flutter_svg: ^2.0.0

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.4
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2

  # Permissions (openAppSettings pour notifications)
  permission_handler: ^11.3.1

  # Connectivité réseau (bannière offline)
  connectivity_plus: ^6.0.5

  # Image picker (photo profil)
  image_picker: ^1.1.2

  # Authentification biométrique (empreinte / FaceID)
  local_auth: ^2.3.0

  # NOTE: google_fonts removed — using bundled Montserrat, NunitoSans, SpaceMono

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_nyama.jpg"
  adaptive_icon_background: "#F57C20"
  adaptive_icon_foreground: "assets/images/logo_nyama.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F57C20"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/mock/
    - assets/icons/
    - assets/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Variable.ttf
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-Variable.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
